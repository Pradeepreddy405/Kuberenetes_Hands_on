apiVersion: apps/v1
kind: Deployment

metadata:
  name: deployment-cip
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-cip

  template:
    metadata:
      labels:
        app: nginx-cip

    spec:
      containers:
      - name: my-nginx-container
        image: nginx:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  labels:
    app: nginx-cip
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: nginx-cip
